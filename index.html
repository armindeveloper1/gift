<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تا روز موعود</title>
    
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            /* برگشت به تم کهکشانی و بنفش اولیه با انیمیشن حرکت آرام */
            background: linear-gradient(135deg, #0f0c1b, #201a3a, #162a45);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff; /* متن سفید برای خوانایی روی پس‌زمینه تیره */
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* باکس اصلی چالش با شیشه مات تیره */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(163, 112, 255, 0.6); /* درخشش نئونی بنفش */
            line-height: 1.6;
        }

        /* استایل اختصاصی بخش تایمر در تم تیره */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            direction: ltr;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 12px;
            min-width: 70px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .time-num {
            font-size: 1.8rem;
            font-weight: bold;
            color: #a370ff; /* بنفش نئونی برای اعداد */
            display: block;
            text-shadow: 0 0 8px rgba(163, 112, 255, 0.5);
        }

        .time-label {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        /* دکمه‌ها */
       .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            height: 60px;
            position: relative;
            width: 100%;
        }

        .btn {
            /* تنظیم دقیق و ثابت عرض و ارتفاع برای هر دو دکمه */
            -webkit-tap-highlight-color: transparent;
            width: 140px; 
            height: 50px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease;
        }

        #yes-btn {
            background: linear-gradient(45deg, #a370ff, #3b82f6);
            color: white;
            box-shadow: 0 0 15px rgba(163, 112, 255, 0.4);
            z-index: 2;
        }

        #yes-btn:active {
            transform: scale(0.95);
        }

        #no-btn {
            background-color: #f43f5e;
            color: white;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(244, 63, 94, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: static;
            margin: 0;
        }

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: popup 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popup {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* استایل عکس ماه شب آشنایی */
        .moon-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), inset 0 0 20px rgba(255,255,255,0.2);
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .letter {
            font-size: 1rem;
            line-height: 1.8;
            color: #e2e8f0;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            border-right: 3px solid #3b82f6;
        }

        /* افکت ذرات آتش‌بازی در تم رنگی اولیه */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: firework 1s ease-out infinite;
            z-index: 1;
        }

        @keyframes firework {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <audio id="bg-music" src="07.Arta & Arown - 24.7 (128).mp3" loop></audio>
    <div class="card fade-in" id="timer-card">
        <h1>کپسول زمان دیجیتال ما ⏳💜</h1>
        <p style="font-size: 0.95rem; margin-bottom: 10px; color: #cbd5e1;">چییزیی نمونده صبر کنننن</p>
        
        <div class="countdown-container">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">روز</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">ساعت</span></div>
            <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">دقیقه</span></div>
            <div class="time-box"><span class="time-num" id="seconds">00</span><span class="time-label">ثانیه</span></div>
        </div>
        <p style="font-size: 1.5rem; margin-top: 15px;">🔒✨</p>
    </div>

    

    <script>
        // تاریخ هدف: ۱ آگوست ۲۰۲۶ ساعت ۰۰:۰۰:۰۰
        const targetDate = new Date("august, 2026 00:00:00").getTime();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

            if (difference < 0) {
                clearInterval(timerInterval);
                document.getElementById("timer-card").classList.add("hidden");
                document.getElementById("quiz-card").classList.remove("hidden");
                document.getElementById("quiz-card").classList.add("fade-in");
            }
        }, 1000);

        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const quizCard = document.getElementById('quiz-card');
        const surpriseCard = document.getElementById('surprise-card');

        function escapeButton() {
            // تبدیل پوزیشن به absolute در اولین حرکت
            if(noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
                noBtn.style.right = 'auto';
            }
            
            const cardRect = quizCard.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // محاسبات دقیق برای اینکه دکمه دقیقاً داخل مرزهای کارت شیشه‌ای جابه‌جا شود
            let newX = Math.random() * (cardRect.width - btnWidth - 40) + 20;
            let newY = Math.random() * (cardRect.height - btnHeight - 120) + 80; // زوایای دکمه‌ها و تایتل لحاظ شده

            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
        }

        noBtn.addEventListener('mouseenter', escapeButton);
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            escapeButton();
        });

        yesBtn.addEventListener('click', () => {
            document.getElementById('bg-music').play();
            quizCard.classList.add('hidden');
            surpriseCard.classList.remove('hidden');
            surpriseCard.classList.add('fade-in');
            createFireworks();
        });

        function createFireworks() {
            const colors = ['#a370ff', '#3b82f6', '#f43f5e', '#f59e0b', '#10b981'];
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                const x = (Math.random() - 0.5) * window.innerWidth + 'px';
                const y = (Math.random() - 0.5) * window.innerHeight + 'px';
                confetti.style.setProperty('--x', x);
                confetti.style.setProperty('--y', y);
                
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = Math.random() * 100 + 'vh';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                
                document.body.appendChild(confetti);
            }
        }
    </script>
</body>
</html>

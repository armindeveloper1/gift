<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یک سوال مهم...</title>
    
    <!-- لود کردن فونت وزیرمتن برای خوانایی شیک و مدرن روی گوشی -->
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c1b, #201a3a, #162a45);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* باکس اصلی چالش */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            transition: all 0.5s ease;
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(163, 112, 255, 0.6);
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            justify-content: left;
            gap: 20px;
            margin-top: 20px;
            height: 60px;
            width: 10;
            position: relative;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            outline: none;
        }

        #yes-btn {
            background: linear-gradient(45deg, #a370ff, #3b82f6);
            color: white;
            box-shadow: 0 0 15px rgba(163, 112, 255, 0.4);
            z-index: 2;
        }

        #yes-btn:active {
            transform: scale(0.95);
        }

        #no-btn {
            background-color: #f43f5e;
            color: white;
            position: absolute;
            /* موقعیت اولیه دکمه خیر */
            right:3px; 
            z-index: 10;
            box-shadow: 0 5px 15px rgba(244, 63, 94, 0.3);
            /* اضافه کردن ترنزیشن نرم برای حرکت دکمه روی موبایل */
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* بخش کادو و سورپرایز اصلی (در ابتدا پنهان است) */
        .hidden {
            display: none !important;
        }

        .surprise {
            opacity: 0;
            transform: scale(0.8);
            animation: popup 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popup {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* استایل عکس ماه شب آشنایی */
        .moon-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), inset 0 0 20px rgba(255,255,255,0.2);
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .letter {
            font-size: 1rem;
            line-height: 1.8;
            color: #e2e8f0;
            text-align: justify;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            border-right: 3px solid #3b82f6;
        }

        /* افکت ذرات آتش‌بازی در پس‌زمینه بعد از برد */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #3b82f6;
            border-radius: 50%;
            animation: firework 1s ease-out infinite;
            z-index: 1;
        }

        @keyframes firework {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- باکس چالش دکمه فراری -->
    <div class="card" id="quiz-card">
        <h1>هنوزم مثل روز اول منو دوست داری؟ 💜</h1>
        <div class="btn-container">
            <button class="btn" id="yes-btn">بله، معلومه! 😍</button>
            <button class="btn" id="no-btn">خیر! 😑</button>
        </div>
    </div>

    <!-- باکس سورپرایز و کادوی اصلی -->
    <div class="card surprise hidden" id="surprise-card">
        <!-- اینجا آدرس عکس ماه دیجیتالی که خریدی را جایگزین moon.png کن -->
        <img src="images.jpg" alt="ماه شب آشنایی" class="moon-img">
        <h1>روز دوست‌دختر مبارک ماه من 🌙✨</h1>
        <p class="letter">
            میدونی؟ آسمون شب آشنایی ما این شکلی بود. از همون شب کل دنیای من قشنگ‌تر و پر از نور شد. مرسی که هستی و با بودنت بهم انگیزه میدی که برای آینده‌مون بجنگم... دوست دارم!
        </p>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const quizCard = document.getElementById('quiz-card');
        const surpriseCard = document.getElementById('surprise-card');

        // تابع فرار دکمه خیر (تعیین موقعیت تصادفی جدید)
        function escapeButton() {
            // ایجاد مرز فرار با توجه به ابعاد صفحه گوشی یا دسکتاپ
            const cardRect = quizCard.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // محدود کردن حرکت دکمه در فضای داخل کارت یا کمی فراتر از آن
            let newX = Math.random() * (cardRect.width - btnWidth - 20) + 10;
            let newY = Math.random() * (cardRect.height - btnHeight - 80) + 40;

            // تبدیل کردن پوزیشن به absolute در اولین حرکت اگر قبلا نبوده
            noBtn.style.position = 'absolute';
            noBtn.style.right = 'auto'; // لغو تراز اولیه راست
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
        }

        // فعال شدن فرار هم با ماوس (کامپیوتر) و هم با اولین لمس دست (گوشی)
        noBtn.addEventListener('mouseenter', escapeButton);
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); // جلوگیری از رفتارهای پیش‌فرض لمس روی گوشی
            escapeButton();
        });

        // وقتی روی دکمه بله کلیک کرد
        yesBtn.addEventListener('click', () => {
            // مخفی کردن چالش و نمایش سورپرایز با انیمیشن
            quizCard.classList.add('hidden');
            surpriseCard.classList.remove('hidden');
            
            // ایجاد افکت آتش‌بازی دیجیتال
            createFireworks();
        });

        // تابع ساخت ذرات نورانی آتش‌بازی در صفحه
        function createFireworks() {
            const colors = ['#a370ff', '#3b82f6', '#f43f5e', '#f59e0b', '#10b981'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // پخش شدن ذرات در جهت‌های تصادفی
                const x = (Math.random() - 0.5) * window.innerWidth + 'px';
                const y = (Math.random() - 0.5) * window.innerHeight + 'px';
                confetti.style.setProperty('--x', x);
                confetti.style.setProperty('--y', y);
                
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = Math.random() * 100 + 'vh';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                
                document.body.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
